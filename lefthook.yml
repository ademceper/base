pre-commit:
  parallel: true
  jobs:
    - name: biome check
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: typecheck
      run: pnpm typecheck

pre-push:
  parallel: true
  jobs:
    - name: biome check
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: npx @biomejs/biome check --no-errors-on-unmatched {staged_files}

    - name: typecheck
      run: pnpm typecheck
